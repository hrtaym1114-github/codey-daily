name: Changelog Sync

# 毎日 09:00 JST (= 00:00 UTC) に Claude Code CHANGELOG をチェック
# 新バージョンが出ていたら data/changelog.json を更新 + ギャップ検出 + PR起票
on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 JST daily
  workflow_dispatch:       # 手動実行可

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch latest CHANGELOG
        run: python3 scripts/fetch-changelog.py .

      - name: Detect feature gaps
        run: python3 scripts/detect-feature-gaps.py .

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/changelog.json data/feature-gaps.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No changelog updates"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            LATEST=$(python3 -c "import json; d=json.load(open('data/changelog.json')); print(d['latest_version'])")
            GAPS=$(python3 -c "import json; d=json.load(open('data/feature-gaps.json')); print(len(d.get('missing_slash_commands', [])))")
            echo "latest=$LATEST" >> $GITHUB_OUTPUT
            echo "gaps=$GAPS" >> $GITHUB_OUTPUT
            echo "🆕 Updates detected: latest=v$LATEST, gaps=$GAPS"
          fi

      - name: Auto-add new features (Claude Code)
        if: steps.check.outputs.changed == 'true' && steps.check.outputs.gaps != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            data/feature-gaps.json から検出された未追加の Claude Code 機能を、
            scripts/generate-standard-seed.py の FEATURES リストに追加してください。

            ## 手順
            1. data/feature-gaps.json を読み、missing_slash_commands の TOP 10 を確認
            2. data/changelog.json から各コマンドの実際の言及内容を確認
            3. scripts/generate-standard-seed.py の既存 slash-command エントリと同じ形式で追加
            4. python3 scripts/generate-standard-seed.py . を実行して features.json と SQL を再生成

            ## 厳守事項
            - **既存登録済みの id は絶対に重複させない**（generate-standard-seed.py を読んで既存IDを確認）
            - **誤検出は除外する**:
              - `/code` は `claude.ai/code` の誤検出（コマンドではない）
              - `/settings` は `settings.json` ファイル名の誤検出（コマンドではない）
              - その他、CHANGELOGで明らかに「ファイル名」「URL」「環境変数」として言及されているもの
            - **description_ja は CHANGELOG の実際の言及内容に基づいて正確に書く**（推測で創作しない）
            - **不確実な機能はスキップ**してよい（質 > 量）
            - 1回の実行で最大 5 機能まで追加（信頼性を担保するため）
            - **git commit / git push はしない**（後段ステップで一括コミット）

            ## エントリの形式
            ```python
            {
                "id": "slash-XXX", "name": "/XXX", "category": "slash-command",
                "summary_ja": "20-30文字の概要",
                "description_ja": "詳細な説明（80-150文字）",
                "examples": [{"title": "...", "code": "/XXX"}],
                "links": [], "difficulty": 1-3, "tier": "free", "related": [...],
            },
            ```

            最後に、追加した機能のIDと名前のリストをサマリーとして報告してください。
          claude_args: --allowedTools Read,Edit,Write,Bash

      - name: Build & Deploy on Master
        if: steps.check.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # 変更ファイルをコミット（Claude が編集した可能性のあるファイルも含む）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/changelog.json data/feature-gaps.json data/features.json scripts/generate-standard-seed.py migrations/003_seed_standard_features.sql
          git commit -m "chore(changelog): sync to v${{ steps.check.outputs.latest }}

          - Latest: v${{ steps.check.outputs.latest }}
          - Missing features: ${{ steps.check.outputs.gaps }} slash commands

          Auto-generated by .github/workflows/changelog-sync.yml" || echo "No changes to commit"
          git push origin main || echo "Push skipped"

          # D1 へ機能データを反映（features.json が更新されている場合のみ意味がある）
          npx wrangler d1 execute codey-daily --remote --file=migrations/003_seed_standard_features.sql || echo "D1 migration skipped"

          npm run build
          npx wrangler deploy

      - name: Open PR for new feature gaps (manual trigger)
        if: steps.check.outputs.changed == 'true' && steps.check.outputs.gaps != '0' && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="changelog-sync-$(date +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/ scripts/generate-standard-seed.py migrations/003_seed_standard_features.sql
          git commit -m "chore: changelog sync v${{ steps.check.outputs.latest }} + ${{ steps.check.outputs.gaps }} feature gaps"
          git push origin "$BRANCH"

          # PR起票 (top 10 gapsを本文に含める)
          GAPS_BODY=$(python3 -c "
          import json
          d = json.load(open('data/feature-gaps.json'))
          lines = ['## 🆕 未追加 Slash Commands TOP 10', '', '| Command | Mentions | First seen |', '|---|---|---|']
          for c in d.get('missing_slash_commands', [])[:10]:
              lines.append(f'| \`{c[\"name\"]}\` | {c[\"mentions\"]} | v{c[\"first_seen\"]} |')
          print('\n'.join(lines))
          ")

          gh pr create \
            --title "🤖 Changelog sync to v${{ steps.check.outputs.latest }}" \
            --body "$(cat <<EOF
          ## 自動更新

          - Latest detected: \`v${{ steps.check.outputs.latest }}\`
          - 未追加機能: ${{ steps.check.outputs.gaps }} 個

          $GAPS_BODY

          ## レビュー観点
          - [ ] CHANGELOG の追加機能を確認
          - [ ] \`scripts/generate-standard-seed.py\` に新機能を追加
          - [ ] python3 scripts/generate-standard-seed.py . で再生成
          - [ ] D1 再シード: \`npx wrangler d1 execute codey-daily --remote --file=migrations/003_seed_standard_features.sql\`
          - [ ] 動作確認後マージ

          🤖 Generated by .github/workflows/changelog-sync.yml
          EOF
          )"
