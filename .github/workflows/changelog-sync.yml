name: Changelog Sync

# 毎日 09:00 JST (= 00:00 UTC) に Claude Code CHANGELOG をチェック
# 新バージョンが出ていたら data/changelog.json を更新 + ギャップ検出 + PR起票
on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 JST daily
  workflow_dispatch:       # 手動実行可

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch latest CHANGELOG
        run: python3 scripts/fetch-changelog.py .

      - name: Detect feature gaps
        run: python3 scripts/detect-feature-gaps.py .

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/changelog.json data/feature-gaps.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No changelog updates"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            LATEST=$(python3 -c "import json; d=json.load(open('data/changelog.json')); print(d['latest_version'])")
            GAPS=$(python3 -c "import json; d=json.load(open('data/feature-gaps.json')); print(len(d.get('missing_slash_commands', [])))")
            echo "latest=$LATEST" >> $GITHUB_OUTPUT
            echo "gaps=$GAPS" >> $GITHUB_OUTPUT
            echo "🆕 Updates detected: latest=v$LATEST, gaps=$GAPS"
          fi

      - name: Build & Deploy on Master
        if: steps.check.outputs.changed == 'true' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # main直push: そのままビルド + デプロイ（changelog.json更新分のみ）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/changelog.json data/feature-gaps.json
          git commit -m "chore(changelog): sync to v${{ steps.check.outputs.latest }}

          - Latest: v${{ steps.check.outputs.latest }}
          - Missing features: ${{ steps.check.outputs.gaps }} slash commands

          Auto-generated by .github/workflows/changelog-sync.yml" || echo "No changes to commit"
          git push origin main || echo "Push skipped"
          npm run build
          npx wrangler deploy

      - name: Open PR for new feature gaps (manual trigger)
        if: steps.check.outputs.changed == 'true' && steps.check.outputs.gaps != '0' && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="changelog-sync-$(date +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/
          git commit -m "chore: changelog sync v${{ steps.check.outputs.latest }} + ${{ steps.check.outputs.gaps }} feature gaps"
          git push origin "$BRANCH"

          # PR起票 (top 10 gapsを本文に含める)
          GAPS_BODY=$(python3 -c "
          import json
          d = json.load(open('data/feature-gaps.json'))
          lines = ['## 🆕 未追加 Slash Commands TOP 10', '', '| Command | Mentions | First seen |', '|---|---|---|']
          for c in d.get('missing_slash_commands', [])[:10]:
              lines.append(f'| \`{c[\"name\"]}\` | {c[\"mentions\"]} | v{c[\"first_seen\"]} |')
          print('\n'.join(lines))
          ")

          gh pr create \
            --title "🤖 Changelog sync to v${{ steps.check.outputs.latest }}" \
            --body "$(cat <<EOF
          ## 自動更新

          - Latest detected: \`v${{ steps.check.outputs.latest }}\`
          - 未追加機能: ${{ steps.check.outputs.gaps }} 個

          $GAPS_BODY

          ## レビュー観点
          - [ ] CHANGELOG の追加機能を確認
          - [ ] \`scripts/generate-standard-seed.py\` に新機能を追加
          - [ ] python3 scripts/generate-standard-seed.py . で再生成
          - [ ] D1 再シード: \`npx wrangler d1 execute codey-daily --remote --file=migrations/003_seed_standard_features.sql\`
          - [ ] 動作確認後マージ

          🤖 Generated by .github/workflows/changelog-sync.yml
          EOF
          )" \
            --label "automated,changelog"
